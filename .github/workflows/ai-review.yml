name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# GITHUB_TOKEN needs write access to post the review.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: pip install httpx

      - name: Run Android PR Reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # New setups store the key as LLM_API_KEY; DEEPSEEK_API_KEY kept as fallback.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.DEEPSEEK_API_KEY }}
          # Provider preset (deepseek|openai|claude). Overrides below are optional.
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          REVIEW_PROFILE: ${{ vars.REVIEW_PROFILE || 'android' }}
        run: python scripts/review_pr.py
